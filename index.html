<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Image Upload</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        #uploadForm {
            margin-top: 20px;
        }
        #statusMessage {
            margin-top: 10px;
            color: green;
        }
    </style>
</head>
<body>

    <h2>Admin Panel - Upload Images</h2>
    <form id="uploadForm">
        <input type="file" id="imageInput" accept="image/*" multiple>
        <button type="button" onclick="uploadImages()">Upload Images</button>
    </form>

    <p id="statusMessage"></p>

    <script>
        async function uploadImages() {
            const input = document.getElementById("imageInput");
            const statusMessage = document.getElementById("statusMessage");

            if (!input.files.length) {
                alert("Please select at least one image.");
                return;
            }

            const formData = new FormData();
            for (let i = 0; i < input.files.length; i++) {
                formData.append("images", input.files[i]);  // Upload multiple files
            }

            statusMessage.textContent = "Uploading...";
            statusMessage.style.color = "blue";

            try {
                const response = await fetch("https://70b3-213-196-101-160.ngrok-free.app/upload", {  // UPDATE THIS
                    method: "POST",
                    body: formData
                });

                const result = await response.json();
                if (response.ok) {
                    statusMessage.textContent = "✅ Upload successful!";
                    statusMessage.style.color = "green";
                } else {
                    statusMessage.textContent = "❌ Error: " + result.error;
                    statusMessage.style.color = "red";
                }
            } catch (error) {
                statusMessage.textContent = "❌ Network error!";
                statusMessage.style.color = "red";
            }
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        #imagesContainer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }
        .imageWrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px;
        }
        img {
            width: 150px;
            height: auto;
            margin-top: 5px;
            border-radius: 5px;
        }
        #selectAll, #downloadBtn {
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h2>Face Search - Upload Image</h2>
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="uploadAndSearch()">Upload & Search</button>

    <br>
    <input type="checkbox" id="selectAll" onclick="toggleSelectAll()"> Select All  
    <button id="downloadBtn" onclick="downloadSelected()">Download Selected</button>  

    <div id="imagesContainer"></div>

    <script>
        async function uploadAndSearch() {
            console.log("📤 Uploading image...");
            const input = document.getElementById("imageInput");
            if (!input.files.length) {
                alert("Please select an image to upload.");
                return;
            }

            const formData = new FormData();
            formData.append("image", input.files[0]);

            try {
                console.log("🚀 Sending request to API...");
                const response = await fetch("https://70b3-213-196-101-160.ngrok-free.app/search", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();
                console.log("✅ Response received:", data);
                
                const imagesContainer = document.getElementById("imagesContainer");
                imagesContainer.innerHTML = "";

                if (data.matches && data.matches.length > 0) {
                    document.getElementById("selectAll").style.display = "inline-block";
                    document.getElementById("downloadBtn").style.display = "inline-block";
                }

                data.matches.forEach(url => {
                    console.log("📷 Displaying image:", url);
                    const imgWrapper = document.createElement("div");
                    imgWrapper.classList.add("imageWrapper");

                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.classList.add("imageCheckbox");
                    checkbox.value = url;

                    const img = document.createElement("img");
                    img.src = url;

                    imgWrapper.appendChild(checkbox);
                    imgWrapper.appendChild(img);
                    imagesContainer.appendChild(imgWrapper);
                });
            } catch (error) {
                console.error("🚨 Error during API request:", error);
                alert("Error fetching search results.");
            }
        }

        function toggleSelectAll() {
            console.log("🔘 Toggling select all");
            const checkboxes = document.querySelectorAll(".imageCheckbox");
            checkboxes.forEach(cb => cb.checked = document.getElementById("selectAll").checked);
        }

        function downloadSelected() {
            console.log("📥 Downloading selected images...");
            const selectedImages = document.querySelectorAll(".imageCheckbox:checked");
            selectedImages.forEach(cb => {
                console.log("⬇️ Downloading:", cb.value);
                const link = document.createElement("a");
                link.href = cb.value;
                link.download = cb.value.split('/').pop();  
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        }
    </script>
</body>
</html>
