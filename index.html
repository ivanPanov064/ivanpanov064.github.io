<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        #imagesContainer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }
        .imageWrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px;
        }
        img {
            width: 100px;
            height: auto;
            margin-top: 5px;
            border-radius: 5px;
        }
        #selectAll, #downloadBtn {
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>Face Search</h2>
    <button onclick="captureAndSendSelfie()">Take Selfie & Search</button>

    <br>
    <input type="checkbox" id="selectAll" onclick="toggleSelectAll()"> Select All  
    <button id="downloadBtn" onclick="downloadSelected()">Download Selected</button>  

    <div id="imagesContainer"></div>

    <script>
        async function captureAndSendSelfie() {
            const video = document.createElement("video");
            document.body.appendChild(video);
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            await video.play();

            const canvas = document.createElement("canvas");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext("2d").drawImage(video, 0, 0, canvas.width, canvas.height);

            const imageBlob = await new Promise(resolve => canvas.toBlob(resolve, "image/jpeg"));
            const formData = new FormData();
            formData.append("image", imageBlob, "selfie.jpg");

            video.srcObject.getTracks().forEach(track => track.stop()); // Stop camera stream

            // Send image to API
            const response = await fetch("https://your-ngrok-url.ngrok-free.app/search", {
                method: "POST",
                body: formData
            });

            const imageUrls = await response.json();
            const imagesContainer = document.getElementById("imagesContainer");
            imagesContainer.innerHTML = "";

            if (imageUrls.length > 0) {
                document.getElementById("selectAll").style.display = "inline-block";
                document.getElementById("downloadBtn").style.display = "inline-block";
            }

            imageUrls.forEach(url => {
                const imgWrapper = document.createElement("div");
                imgWrapper.classList.add("imageWrapper");

                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.classList.add("imageCheckbox");
                checkbox.value = url;

                const img = document.createElement("img");
                img.src = url;

                imgWrapper.appendChild(checkbox);
                imgWrapper.appendChild(img);
                imagesContainer.appendChild(imgWrapper);
            });
        }

        function toggleSelectAll() {
            const checkboxes = document.querySelectorAll(".imageCheckbox");
            checkboxes.forEach(cb => cb.checked = document.getElementById("selectAll").checked);
        }

        function downloadSelected() {
            const selectedImages = document.querySelectorAll(".imageCheckbox:checked");
            selectedImages.forEach(cb => {
                const link = document.createElement("a");
                link.href = cb.value;
                link.download = cb.value.split('/').pop();  
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        }
    </script>

</body>
</html>
