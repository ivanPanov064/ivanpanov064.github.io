<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        #video {
            width: 100%;
            max-width: 400px;
            border: 1px solid #ccc;
        }
        #images-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }
        .image-wrapper {
            position: relative;
            margin: 10px;
        }
        .image-wrapper img {
            width: 100px;
            height: 100px;
            object-fit: cover;
        }
        .image-checkbox {
            position: absolute;
            top: 5px;
            left: 5px;
        }
    </style>
</head>
<body>
    <h1>Face Recognition Test</h1>
    <video id="video" autoplay></video>
    <br>
    <button id="capture-btn">Find My Photos</button>
    <br>
    <label><input type="checkbox" id="select-all"> Select All</label>
    <button id="download-btn">Download Selected</button>
    <div id="images-container"></div>
    
    <script>
        const video = document.getElementById('video');
        const captureBtn = document.getElementById('capture-btn');
        const imagesContainer = document.getElementById('images-container');
        const selectAllCheckbox = document.getElementById('select-all');
        const downloadBtn = document.getElementById('download-btn');
        
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => console.error("Error accessing webcam:", err));
        
        captureBtn.addEventListener('click', async () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg'));
            const formData = new FormData();
            formData.append('image', imageBlob, 'selfie.jpg');
            
            const response = await fetch('https://320a-213-196-101-130.ngrok-free.app/search', {
                method: 'POST',
                body: formData
            });
            

            
            const imageUrls = await response.json();
            imagesContainer.innerHTML = '';
            
            imageUrls.forEach(url => {
                const wrapper = document.createElement('div');
                wrapper.classList.add('image-wrapper');
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.classList.add('image-checkbox');
                
                const img = document.createElement('img');
                img.src = url;
                
                wrapper.appendChild(checkbox);
                wrapper.appendChild(img);
                imagesContainer.appendChild(wrapper);
            });
        });
        
        selectAllCheckbox.addEventListener('change', () => {
            document.querySelectorAll('.image-checkbox').forEach(cb => cb.checked = selectAllCheckbox.checked);
        });
        
        downloadBtn.addEventListener('click', () => {
            document.querySelectorAll('.image-checkbox:checked').forEach(cb => {
                const img = cb.nextElementSibling;
                const a = document.createElement('a');
                a.href = img.src;
                a.download = 'downloaded_image.jpg';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
        });
    </script>
</body>
</html>
